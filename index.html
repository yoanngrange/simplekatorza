<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Katorza — Programme</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:            #0F0E0C;
    --bg-elev:       #1A1815;
    --bg-elev-2:     #232019;
    --border:        #2A2620;
    --border-strong: #3A342B;
    --text:          #F2EDE3;
    --text-muted:    #8A8478;
    --text-dim:      #5D584F;
    --accent:        #E8B54A;   /* amber, marquee */
    --accent-soft:   #E8B54A22;
    --urgent:        #E85A3C;   /* imminent, «dans moins d'une heure» */
    --urgent-soft:   #E85A3C22;
    --vo:            #B5C29B;   /* soft green for VO tag */
    --vf:            #C9BDA8;   /* warm muted for VF tag */

    --font-display: 'Fraunces', 'Georgia', serif;
    --font-body:    'Inter', system-ui, -apple-system, sans-serif;
    --font-mono:    'IBM Plex Mono', 'Menlo', 'Monaco', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 15px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; }

  a { color: inherit; text-decoration: none; }

  /* --- Header --- */
  header.masthead {
    padding: 32px 24px 20px;
    max-width: 1180px;
    margin: 0 auto;
    border-bottom: 1px solid var(--border);
  }
  .brand-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .brand {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: clamp(48px, 9vw, 96px);
    letter-spacing: -0.03em;
    line-height: 0.9;
    font-variation-settings: 'opsz' 144, 'SOFT' 100;
  }
  .brand em {
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }
  .subtitle {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    max-width: 320px;
    text-align: right;
    line-height: 1.5;
  }
  .subtitle .live-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 6px;
    vertical-align: middle;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  /* --- Tabs --- */
  nav.tabs {
    max-width: 1180px;
    margin: 0 auto;
    padding: 20px 24px 0;
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .tab {
    background: transparent;
    border: 0;
    color: var(--text-muted);
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    padding: 14px 18px 16px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }
  .tab .count {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    background: var(--bg-elev);
    padding: 2px 6px;
    border-radius: 3px;
  }
  .tab.active .count { color: var(--accent); background: var(--accent-soft); }

  /* --- Main --- */
  main {
    max-width: 1180px;
    margin: 0 auto;
    padding: 24px 24px 80px;
  }

  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
    font-family: var(--font-display);
    font-style: italic;
    font-size: 20px;
  }
  .empty small {
    display: block;
    margin-top: 8px;
    font-family: var(--font-mono);
    font-style: normal;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
  }

  /* --- Film card --- */
  .film {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 24px;
    padding: 28px 0;
    border-bottom: 1px solid var(--border);
  }
  .film:last-child { border-bottom: 0; }

  .poster {
    aspect-ratio: 2 / 3;
    background: var(--bg-elev);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .poster img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .poster.no-img::after {
    content: '?';
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    font-family: var(--font-display);
    font-size: 40px;
    color: var(--text-dim);
  }

  .film-body { display: flex; flex-direction: column; gap: 14px; }

  .film-title {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: clamp(22px, 3vw, 30px);
    letter-spacing: -0.015em;
    line-height: 1.1;
    font-variation-settings: 'opsz' 60;
  }
  .film-title a { border-bottom: 1px solid transparent; transition: border-color 0.15s; }
  .film-title a:hover { border-bottom-color: var(--accent); }

  .film-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 12px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .film-meta span:not(:last-child)::after {
    content: '·';
    margin-left: 12px;
    color: var(--text-dim);
  }
  .film-meta .director { color: var(--text); }

  .film-synopsis {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.55;
    max-width: 68ch;
  }

  /* --- Séances grid --- */
  .seances {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-top: 8px;
    padding-top: 14px;
    border-top: 1px dashed var(--border);
  }
  .day {
    display: flex;
    flex-direction: column;
    gap: 5px;
    min-width: 0;
  }
  .day-header {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .day-header .day-num {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .day-header.is-today .day-num { color: var(--accent); }
  .day-header.is-today .day-label { color: var(--accent); }

  .seance {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--bg-elev);
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text);
    transition: background 0.12s, border-color 0.12s;
    cursor: pointer;
    text-decoration: none;
  }
  .seance:hover {
    background: var(--bg-elev-2);
    border-color: var(--border-strong);
  }
  .seance .time { font-weight: 500; }
  .seance .v {
    font-size: 9px;
    padding: 1px 4px;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--bg);
    font-weight: 600;
  }
  .seance .v.vo { background: var(--vo); }
  .seance .v.vf { background: var(--vf); }

  /* passée */
  .seance.past {
    opacity: 0.32;
    cursor: default;
  }
  .seance.past:hover { background: var(--bg-elev); border-color: var(--border); }

  /* imminente (< 1h) */
  .seance.imminent {
    border-color: var(--urgent);
    background: var(--urgent-soft);
    color: var(--text);
    animation: glow 2.4s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% { box-shadow: 0 0 0 0 var(--urgent-soft); }
    50%      { box-shadow: 0 0 0 3px var(--urgent-soft); }
  }
  .seance.imminent .time::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--urgent);
    margin-right: 6px;
    vertical-align: middle;
  }

  .no-seance {
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 6px 0;
    text-align: center;
  }

  /* --- View «Dans moins d'une heure» --- */
  .urgent-list { display: flex; flex-direction: column; gap: 12px; }
  .urgent-row {
    display: grid;
    grid-template-columns: 70px 1fr auto;
    gap: 20px;
    align-items: center;
    padding: 18px 20px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 4px;
    text-decoration: none;
    transition: background 0.12s, border-color 0.12s;
  }
  .urgent-row:hover {
    background: var(--bg-elev-2);
    border-color: var(--urgent);
  }
  .urgent-row .countdown {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 500;
    color: var(--urgent);
    line-height: 1;
    text-align: center;
  }
  .urgent-row .countdown small {
    display: block;
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-top: 4px;
    font-weight: 400;
  }
  .urgent-row .info { min-width: 0; }
  .urgent-row .info .t {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 18px;
    line-height: 1.2;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .urgent-row .info .m {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .urgent-row .go {
    font-family: var(--font-mono);
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
    padding: 8px 14px;
    border: 1px solid var(--border-strong);
    border-radius: 3px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .urgent-row .go .time { font-size: 18px; }
  .urgent-row .go .v {
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    margin-top: 2px;
  }

  /* --- Footer --- */
  footer {
    max-width: 1180px;
    margin: 0 auto;
    padding: 32px 24px 40px;
    border-top: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  footer a { color: var(--text-muted); }
  footer a:hover { color: var(--accent); }

  /* --- Responsive --- */
  @media (max-width: 780px) {
    .film { grid-template-columns: 90px 1fr; gap: 16px; padding: 20px 0; }
    .film-synopsis { font-size: 13px; }
    .seances { grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 3px; }
    .day-header {
      font-size: 9px;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
      padding-bottom: 4px;
    }
    .day-header .day-num { font-size: 12px; }
    .seance {
      padding: 4px 3px;
      font-size: 10px;
      flex-direction: column;
      gap: 2px;
      align-items: center;
      text-align: center;
      justify-content: center;
    }
    .seance .time { font-size: 11px; }
    .seance .v { font-size: 7px; padding: 1px 3px; }
    .seance.imminent .time::before { width: 4px; height: 4px; margin-right: 3px; }
    .no-seance { font-size: 9px; }
    .urgent-row { grid-template-columns: 60px 1fr auto; gap: 12px; padding: 14px; }
    .urgent-row .info .t { font-size: 15px; }
    .urgent-row .go .time { font-size: 15px; }
  }

  @media (max-width: 480px) {
    header.masthead { padding: 24px 16px 16px; }
    nav.tabs { padding: 16px 16px 0; }
    main { padding: 16px 16px 60px; }
    footer { padding: 24px 16px 32px; }
    .brand { font-size: clamp(40px, 14vw, 64px); }
    .subtitle { font-size: 10px; }
    .film { grid-template-columns: 72px 1fr; gap: 12px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .subtitle .live-dot,
    .seance.imminent { animation: none; }
  }
</style>
</head>
<body>

<header class="masthead">
  <div class="brand-row">
    <div class="brand">Kat<em>orza</em></div>
    <div class="subtitle">
      <span class="live-dot"></span>
      <span id="now-label"></span><br>
      Programmation de la semaine
    </div>
  </div>
</header>

<nav class="tabs" role="tablist">
  <button class="tab active" data-view="programme" role="tab" aria-selected="true">
    Programme <span class="count" id="count-programme">–</span>
  </button>
  <button class="tab" data-view="urgent" role="tab" aria-selected="false">
    Dans moins d'une heure <span class="count" id="count-urgent">–</span>
  </button>
</nav>

<main>
  <section id="view-programme" role="tabpanel"></section>
  <section id="view-urgent" role="tabpanel" hidden></section>
</main>

<footer>
  <div>
    <a id="cinema-link" href="#" target="_blank" rel="noopener">Katorza · 3 rue Corneille, Nantes</a>
  </div>
  <div>
    Source : <a id="source-link" href="#" target="_blank" rel="noopener">cinefil.com</a>
    · <span id="scraped-at">–</span>
  </div>
</footer>

<script>
(function () {
  'use strict';

  const JOURS_COURT = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
  const JOURS_LONG  = ['Dimanche', 'Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi'];

  const state = {
    data: null,
    weekDates: [],       // 7 Date objects starting today
    view: 'programme',
    now: new Date(),
  };

  // ---------- Utils ----------

  function fmtDuration(min) {
    if (!min) return null;
    const h = Math.floor(min / 60);
    const m = min % 60;
    return h ? `${h}h${String(m).padStart(2, '0')}` : `${m}min`;
  }

  function seanceDate(seance) {
    // "2026-07-04" + "20:30" → Date
    const [y, mo, d] = seance.date.split('-').map(Number);
    const [h, mi] = seance.time.split(':').map(Number);
    return new Date(y, mo - 1, d, h, mi, 0, 0);
  }

  function isSameDay(a, b) {
    return a.getFullYear() === b.getFullYear()
      && a.getMonth() === b.getMonth()
      && a.getDate() === b.getDate();
  }

  function fmtNow(d) {
    const day = JOURS_LONG[d.getDay()];
    const num = d.getDate();
    const mo = ['janv.', 'févr.', 'mars', 'avr.', 'mai', 'juin', 'juil.', 'août', 'sept.', 'oct.', 'nov.', 'déc.'][d.getMonth()];
    const t = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    return `${day} ${num} ${mo} · ${t}`;
  }

  function computeWeekDates(baseDate, films) {
    // Prend la plus petite date de séance ≥ aujourd'hui, ou aujourd'hui, comme point de départ
    const today = new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate());
    let start = today;
    // Vérifie qu'on a bien des séances sur la semaine à partir d'aujourd'hui
    // Sinon, cale sur la première date de séance disponible
    const allDates = films
      .flatMap(f => f.seances.map(s => s.date))
      .sort();
    if (allDates.length) {
      const firstIso = allDates[0];
      const [y, mo, d] = firstIso.split('-').map(Number);
      const first = new Date(y, mo - 1, d);
      if (first > today) start = first;
    }
    return Array.from({ length: 7 }, (_, i) => {
      const d = new Date(start);
      d.setDate(d.getDate() + i);
      return d;
    });
  }

  function seanceStatus(seance, now) {
    const dt = seanceDate(seance);
    const diffMs = dt - now;
    if (diffMs < 0) return { key: 'past', diffMs };
    if (diffMs <= 60 * 60 * 1000) return { key: 'imminent', diffMs };
    return { key: 'future', diffMs };
  }

  function fmtCountdown(ms) {
    const m = Math.floor(ms / 60000);
    if (m < 1) return '< 1 min';
    if (m < 60) return `${m} min`;
    const h = Math.floor(m / 60);
    const rm = m % 60;
    return rm ? `${h}h${String(rm).padStart(2,'0')}` : `${h}h`;
  }

  function katorzaBilletterieUrl(film) {
    // Le lien direct VAD par séance n'est pas fiable à générer sans scraper
    // katorza.fr. On envoie donc vers la fiche générale du cinéma, qui liste
    // les créneaux avec leurs liens VAD réels.
    return state.data?.cinema?.billetterie_url || '#';
  }

  // ---------- Rendu ----------

  function renderProgramme() {
    const container = document.getElementById('view-programme');
    const films = state.data.films;
    if (!films.length) {
      container.innerHTML = `<div class="empty">Pas de séance cette semaine<small>Programmation vide</small></div>`;
      return;
    }

    container.innerHTML = films.map(renderFilmCard).join('');
  }

  function renderFilmCard(film) {
    const posterEl = film.poster_url
      ? `<div class="poster"><img src="${film.poster_url}" alt="Affiche ${escapeHtml(film.title)}" loading="lazy" onerror="this.parentElement.classList.add('no-img'); this.remove();"></div>`
      : `<div class="poster no-img"></div>`;

    const meta = [];
    if (film.year) meta.push(`<span>${film.year}</span>`);
    if (film.duration_min) meta.push(`<span>${fmtDuration(film.duration_min)}</span>`);
    if (film.genre) meta.push(`<span>${escapeHtml(film.genre)}</span>`);
    if (film.directors && film.directors.length) {
      meta.push(`<span class="director">${film.directors.map(escapeHtml).join(', ')}</span>`);
    }

    // Grille séances
    const seancesByDate = {};
    for (const d of state.weekDates) {
      const iso = toIsoDate(d);
      seancesByDate[iso] = [];
    }
    for (const s of film.seances) {
      if (seancesByDate[s.date] !== undefined) {
        seancesByDate[s.date].push(s);
      }
    }
    for (const iso in seancesByDate) {
      seancesByDate[iso].sort((a, b) => a.time.localeCompare(b.time));
    }

    const daysHtml = state.weekDates.map(d => {
      const iso = toIsoDate(d);
      const isToday = isSameDay(d, state.now);
      const seances = seancesByDate[iso] || [];
      const header = `<div class="day-header ${isToday ? 'is-today' : ''}">
        <span class="day-label">${JOURS_COURT[d.getDay()]}</span>
        <span class="day-num">${d.getDate()}</span>
      </div>`;
      if (!seances.length) {
        return `<div class="day">${header}<div class="no-seance">—</div></div>`;
      }
      const items = seances.map(s => renderSeance(s, film)).join('');
      return `<div class="day">${header}${items}</div>`;
    }).join('');

    return `
      <article class="film">
        ${posterEl}
        <div class="film-body">
          <h2 class="film-title"><a href="${film.detail_url || '#'}" target="_blank" rel="noopener">${escapeHtml(film.title)}</a></h2>
          <div class="film-meta">${meta.join('')}</div>
          ${film.synopsis ? `<p class="film-synopsis">${escapeHtml(film.synopsis)}</p>` : ''}
          <div class="seances">${daysHtml}</div>
        </div>
      </article>
    `;
  }

  function renderSeance(s, film) {
    const status = seanceStatus(s, state.now);
    const v = s.version ? `<span class="v ${s.version.toLowerCase()}">${s.version}</span>` : '';
    const cls = `seance ${status.key}`;
    if (status.key === 'past') {
      return `<div class="${cls}"><span class="time">${s.time}</span>${v}</div>`;
    }
    const href = katorzaBilletterieUrl(film);
    return `<a class="${cls}" href="${href}" target="_blank" rel="noopener" title="Réserver sur katorza.fr">
      <span class="time">${s.time}</span>${v}
    </a>`;
  }

  function renderUrgent() {
    const container = document.getElementById('view-urgent');
    const items = [];
    for (const film of state.data.films) {
      for (const s of film.seances) {
        const status = seanceStatus(s, state.now);
        if (status.key === 'imminent') {
          items.push({ film, seance: s, diffMs: status.diffMs });
        }
      }
    }
    items.sort((a, b) => a.diffMs - b.diffMs);

    if (!items.length) {
      container.innerHTML = `<div class="empty">Rien dans l'heure qui vient<small>Prochaine séance plus tard</small></div>`;
      return;
    }

    container.innerHTML = `<div class="urgent-list">${
      items.map(({ film, seance, diffMs }) => {
        const meta = [];
        if (film.duration_min) meta.push(fmtDuration(film.duration_min));
        if (film.genre) meta.push(film.genre);
        if (film.directors?.length) meta.push(film.directors.join(', '));
        const v = seance.version ? `<span class="v">${seance.version}</span>` : '';
        return `<a class="urgent-row" href="${katorzaBilletterieUrl(film)}" target="_blank" rel="noopener">
          <div class="countdown">${fmtCountdown(diffMs)}<small>Départ</small></div>
          <div class="info">
            <div class="t">${escapeHtml(film.title)}</div>
            <div class="m">${meta.map(escapeHtml).join(' · ')}</div>
          </div>
          <div class="go"><span class="time">${seance.time}</span>${v}</div>
        </a>`;
      }).join('')
    }</div>`;
  }

  function updateCounts() {
    document.getElementById('count-programme').textContent = state.data.films.length;
    let urgent = 0;
    for (const f of state.data.films) {
      for (const s of f.seances) {
        if (seanceStatus(s, state.now).key === 'imminent') urgent++;
      }
    }
    document.getElementById('count-urgent').textContent = urgent;
  }

  function updateNowLabel() {
    document.getElementById('now-label').textContent = fmtNow(state.now);
  }

  // ---------- Helpers ----------

  function toIsoDate(d) {
    return d.getFullYear() + '-'
      + String(d.getMonth() + 1).padStart(2, '0') + '-'
      + String(d.getDate()).padStart(2, '0');
  }

  function escapeHtml(str) {
    return String(str ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  // ---------- Navigation ----------

  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      const view = btn.dataset.view;
      state.view = view;
      document.querySelectorAll('.tab').forEach(t => {
        const active = t.dataset.view === view;
        t.classList.toggle('active', active);
        t.setAttribute('aria-selected', active ? 'true' : 'false');
      });
      document.getElementById('view-programme').hidden = view !== 'programme';
      document.getElementById('view-urgent').hidden = view !== 'urgent';
    });
  });

  // ---------- Boot ----------

  async function load() {
    let data;
    try {
      const res = await fetch('programme.json', { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      data = await res.json();
    } catch (err) {
      document.getElementById('view-programme').innerHTML = `
        <div class="empty">
          Impossible de charger programme.json
          <small>${escapeHtml(err.message)} · lance <code>python3 -m http.server</code> dans le dossier</small>
        </div>`;
      return;
    }
    state.data = data;
    state.now = new Date();
    state.weekDates = computeWeekDates(state.now, data.films);

    // Footer
    if (data.cinema?.billetterie_url) {
      const link = document.getElementById('cinema-link');
      link.href = data.cinema.billetterie_url;
    }
    if (data.source) {
      const s = document.getElementById('source-link');
      s.href = data.source;
    }
    if (data.scraped_at) {
      const d = new Date(data.scraped_at);
      document.getElementById('scraped-at').textContent = 'MAJ ' + fmtNow(d);
    }

    updateNowLabel();
    updateCounts();
    renderProgramme();
    renderUrgent();
  }

  // Rafraichit l'horloge + statut des séances chaque minute
  setInterval(() => {
    if (!state.data) return;
    state.now = new Date();
    updateNowLabel();
    updateCounts();
    renderProgramme();
    renderUrgent();
  }, 60_000);

  load();
})();
</script>
</body>
</html>
