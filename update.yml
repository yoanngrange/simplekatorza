name: Update programme

on:
  # Chaque mercredi à 09:00 UTC (11:00 heure française l'été, 10:00 l'hiver)
  schedule:
    - cron: '0 9 * * 3'
  # Bouton "Run workflow" dans l'onglet Actions du repo
  workflow_dispatch:

permissions:
  contents: write   # nécessaire pour commit les changements

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scraper.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add programme.json posters/
          if git diff --staged --quiet; then
            echo "Aucun changement, rien à commit"
          else
            git commit -m "MAJ programme $(date -u +'%Y-%m-%d')"
            git push
          fi
